<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myshop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f6f8;
}

.navbar{
    height:70px;
    background:#0f0f0f;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 25px;
}

.logo h1{
    color:white;
    font-size:24px;
}

.search input{
    width:420px;
    padding:10px 14px;
    border-radius:20px;
    border:none;
    outline:none;
}

.right-buttons{
    display:flex;
    gap:15px;
}

.right-buttons a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

.main{
    max-width:1200px;
    margin:20px auto;
    display:flex;
    gap:20px;
    padding:0 15px;
}

.sidebar{
    width:240px;
    background:white;
    border-radius:12px;
    padding:10px;
    height:fit-content;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.content{
    padding:10px;
    font-size:14px;
    cursor:pointer;
}

.content:hover{
    background:#f1f1f1;
}

.products{
    flex:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
    cursor:pointer;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h3{
    font-size:14px;
    padding:10px;
}

.price{
    padding:0 10px 10px;
    font-weight:bold;
    color:#111;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <h1>Myshop</h1>
    </div>

    <div class="search">
        <input type="text" placeholder="Search...">
    </div>

    <div class="right-buttons">
        <a href="cart.html">🛒</a>
        <a href="register.html">Sign in</a>
        <a href="login.html">Log in</a>
    </div>
</nav>

<div class="main">

    <div class="sidebar">
        <div class="content">Air Conditioners</div>
        <div class="content">Apple</div>
        <div class="content">Smartphones</div>
        <div class="content">Gaming</div>
        <div class="content">Laptops</div>
        <div class="content">TV & Audio</div>
        <div class="content">Home Appliances</div>
        <div class="content">Beauty</div>
    </div>

    <div class="products">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800" alt="">
            <h3>Smth1</h3>
            <div class="price">$299</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" alt="">
            <h3>Smth2</h3>
            <div class="price">$99</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" alt="">
            <h3>Smth3</h3>
            <div class="price">$149</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=800" alt="">
            <h3>Smth4</h3>
            <div class="price">$899</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800" alt="">
            <h3>Smth5</h3>
            <div class="price">$120</div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1512499617640-c74ae3a79d37?w=800" alt="">
            <h3>Smth6</h3>
            <div class="price">$199</div>
        </div>

    </div>

</div>

</body>
</html>
